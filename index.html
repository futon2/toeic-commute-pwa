<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#1f6f5b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="TOEIC通勤">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>TOEIC通勤</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">TOEIC通勤</p>
          <h1>今日の10分を点数に変える</h1>
        </div>
        <div class="streak" aria-label="連続学習日数">
          <span id="streakDays">0</span>
          <small>days</small>
        </div>
      </header>

      <section class="summary-grid" aria-label="学習状況">
        <article class="metric">
          <span class="metric-label">今日</span>
          <strong id="todayCount">0</strong>
          <span>問</span>
        </article>
        <article class="metric">
          <span class="metric-label">正答率</span>
          <strong id="accuracy">0%</strong>
          <span>累計</span>
        </article>
        <article class="metric">
          <span class="metric-label">復習</span>
          <strong id="reviewCount">0</strong>
          <span>件</span>
        </article>
      </section>

      <nav class="tabs" aria-label="学習メニュー">
        <button class="tab active" data-view="quizView" type="button">問題</button>
        <button class="tab" data-view="cardsView" type="button">単語</button>
        <button class="tab" data-view="reviewView" type="button">復習</button>
      </nav>

      <section id="quizView" class="view active">
        <div class="toolbar">
          <label>
            <span>学習時間</span>
            <select id="sessionLength">
              <option value="5">5分</option>
              <option value="10" selected>10分</option>
              <option value="15">15分</option>
            </select>
          </label>
          <button id="newQuestion" class="icon-button" type="button" aria-label="次の問題">次</button>
        </div>

        <article class="question-panel">
          <div class="question-meta">
            <span id="partLabel">Part 5</span>
            <span id="timer">10:00</span>
          </div>
          <p id="questionText" class="question-text"></p>
          <div id="answers" class="answers"></div>
          <div id="feedback" class="feedback" aria-live="polite"></div>
        </article>
      </section>

      <section id="cardsView" class="view">
        <div class="toolbar">
          <button id="shuffleCards" class="icon-button" type="button">シャッフル</button>
          <button id="knownCard" class="icon-button" type="button">覚えた</button>
        </div>
        <article class="flashcard" id="flashcard" tabindex="0" role="button" aria-label="単語カードを反転">
          <p class="card-label">Vocabulary</p>
          <h2 id="cardFront"></h2>
          <p id="cardBack" class="card-back"></p>
          <small>タップで意味を表示</small>
        </article>
      </section>

      <section id="reviewView" class="view">
        <div class="review-head">
          <h2>間違えた問題</h2>
          <button id="clearReview" class="text-button" type="button">復習リストを空にする</button>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
